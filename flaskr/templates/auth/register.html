{% block header %}
  <h1>{% block title %}Register{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">
    <label for="username">Username</label><input name="username" id="username" required>
    <label for="password">Password</label><input type="password" name="password" id="password" required>
    <label for="user_type">User type</label><input name="user_type" id="user_type" required>
    <label for="email">Email</label><input name="email" id="email" required>

    <input type="submit" value="Register">
  </form>
{% endblock %}
